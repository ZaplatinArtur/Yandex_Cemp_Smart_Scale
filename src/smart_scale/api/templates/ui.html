<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Scale UI</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --surface: #ffffff;
        --surface-2: #eef4f8;
        --line: #d7e1e8;
        --text: #17212b;
        --muted: #657282;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --danger: #c2410c;
        --danger-bg: #fff4ed;
        --success: #15803d;
        --success-bg: #ecfdf3;
        --warning-bg: #fff7d6;
        --warning-text: #7c5800;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      }

      .container { max-width: 1180px; margin: 0 auto; }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
        padding: 16px 18px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .brand { display: flex; align-items: center; gap: 12px; }
      .logo {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: var(--accent);
        color: #fff;
        font-weight: 800;
      }
      .brand-title { font-size: 1.35rem; font-weight: 800; line-height: 1.1; }
      .brand-subtitle { color: var(--muted); margin-top: 3px; }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 420px;
        gap: 20px;
        align-items: start;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
      }

      .panel + .panel { margin-top: 16px; }
      .panel h2, .panel h3 { margin: 0 0 14px; line-height: 1.2; }
      .panel h2 { font-size: 1.05rem; }
      .panel h3 { font-size: 1rem; }

      .field { margin-bottom: 14px; }
      label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-weight: 650;
        font-size: 0.92rem;
      }
      input[type="number"], input[type="search"], input[type="text"], input[type="password"] {
        width: 100%;
        min-height: 38px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
      }

      .file-picker {
        border: 1px dashed #b8c8d4;
        border-radius: 8px;
        padding: 12px;
        background: #fbfdff;
        cursor: pointer;
      }
      .file-picker.dragover { border-color: var(--accent); background: #f0fdfa; }
      .file-row { display: flex; gap: 12px; align-items: center; }
      .preview {
        width: 84px;
        height: 84px;
        flex: 0 0 84px;
        border-radius: 8px;
        background: var(--surface-2);
        overflow: hidden;
      }
      .preview img { width: 100%; height: 100%; object-fit: contain; display: none; }
      .file-title { font-weight: 750; overflow-wrap: anywhere; }
      .file-hint { margin-top: 4px; color: var(--muted); font-size: 0.92rem; }

      .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
      button {
        min-height: 38px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 8px 12px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        background: #fff;
        color: var(--text);
      }
      button:disabled { opacity: 0.58; cursor: not-allowed; }
      .btn-primary { background: var(--accent); color: #fff; }
      .btn-primary:hover { background: var(--accent-strong); }
      .btn-secondary { border-color: var(--line); }
      .btn-danger { background: var(--danger); color: #fff; }
      .btn-ghost { color: var(--accent-strong); border-color: #9ccfc9; }

      .status {
        min-height: 24px;
        margin-top: 12px;
        color: var(--muted);
      }

      #confirmPanel h3 { text-align: center; }
      #confirmText {
        margin: 2px 0 16px;
        min-height: 0;
        color: var(--text);
        line-height: 1.45;
        text-align: center;
        overflow-wrap: anywhere;
      }
      .confirm-actions {
        justify-content: center;
        align-items: stretch;
      }
      .confirm-actions button {
        flex: 1 1 150px;
        min-width: 0;
      }
      .admin-add {
        display: grid;
        gap: 10px;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }
      .admin-add-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .admin-add .field { margin-bottom: 0; }

      .result-state {
        border-radius: 8px;
        padding: 12px;
        border: 1px solid var(--line);
        background: #fbfdff;
      }
      .result-state.ok { background: var(--success-bg); border-color: #b7e4c7; }
      .result-state.warning { background: var(--warning-bg); border-color: #f4d35e; color: var(--warning-text); }
      .result-state.error { background: var(--danger-bg); border-color: #fdba74; color: #7c2d12; }
      .result-state.empty {
        display: grid;
        place-items: center;
        min-height: 250px;
        padding: 16px;
      }

      .result-title { font-weight: 800; margin-bottom: 6px; }
      .result-meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }
      .metric {
        padding: 8px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(215, 225, 232, 0.8);
      }
      .metric-label { color: var(--muted); font-size: 0.82rem; }
      .metric-value { margin-top: 2px; font-weight: 750; overflow-wrap: anywhere; }

      .history-image-preview { margin-top: 12px; }
      .history-image-label {
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.88rem;
        font-weight: 700;
      }
      .history-image-frame {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fbfd;
        padding: 6px;
      }
      .history-image-frame img {
        display: block;
        width: 100%;
        height: auto;
        object-fit: contain;
      }
      .history-image-meta {
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.84rem;
        overflow-wrap: anywhere;
      }
      .idle-result {
        width: 100%;
        display: grid;
        place-items: center;
      }
      .idle-result img {
        display: block;
        width: 100%;
        max-width: 320px;
        height: auto;
        object-fit: contain;
      }

      .match-list { display: grid; gap: 10px; }
      .match-card {
        display: grid;
        grid-template-columns: 86px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        text-align: left;
        width: 100%;
      }
      .match-card:hover { border-color: #8cc7c0; }
      .match-card img {
        width: 86px;
        height: 72px;
        border-radius: 8px;
        object-fit: cover;
        background: var(--surface-2);
      }
      .match-name { font-weight: 800; overflow-wrap: anywhere; }
      .match-details { margin-top: 5px; color: var(--muted); font-size: 0.9rem; }

      .catalog-tools { display: grid; gap: 10px; margin-bottom: 10px; }
      .catalog-list {
        display: grid;
        gap: 8px;
        max-height: 430px;
        overflow: auto;
        padding-right: 4px;
      }
      .catalog-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        width: 100%;
        border: 1px solid var(--line);
        background: #fff;
        text-align: left;
      }
      .catalog-label { font-weight: 760; overflow-wrap: anywhere; }
      .catalog-price { color: var(--muted); font-size: 0.9rem; white-space: nowrap; }

      .empty {
        color: var(--muted);
        padding: 12px;
        border: 1px dashed var(--line);
        border-radius: 8px;
      }

      .hidden { display: none !important; }

      @media (max-width: 980px) {
        body { padding: 14px; }
        .layout { grid-template-columns: 1fr; }
        .result-meta { grid-template-columns: 1fr; }
        .admin-add-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="brand">
          <div class="logo">УВ</div>
          <div>
            <div class="brand-title">Умные весы</div>

          </div>
        </div>
      </header>

      <div class="layout">
        <main>
          <section class="panel">
            <h2>Новое распознавание</h2>
            <form id="predictForm">
              <div class="field">
                <label for="imageInput">Фото продукта</label>
                <div class="file-picker" id="filePicker" role="button" tabindex="0">
                  <input type="file" id="imageInput" name="image" accept="image/*" required hidden />
                  <div class="file-row">
                    <div class="preview"><img id="previewImg" alt="" /></div>
                    <div>
                      <div class="file-title" id="fileTitle">Выберите изображение или перетащите сюда</div>
                      <div class="file-hint">JPG, PNG, WEBP до 10 MB</div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="field">
                <label for="weightInput">Вес, граммы</label>
                <input type="number" id="weightInput" name="weight_grams" value="100" min="0" step="0.01" required />
              </div>

              <div class="field">
                <label for="topkInput">Количество ближайших вариантов</label>
                <input type="number" id="topkInput" name="top_k" value="5" min="1" max="10" />
              </div>

              <div class="actions">
                <button type="submit" class="btn-primary" id="submitBtn">Распознать</button>
                <button type="button" class="btn-secondary" id="resetBtn">Сбросить</button>
              </div>
            </form>
            <div id="status" class="status"></div>
          </section>

          <section class="panel hidden" id="catalogPanel">
            <h3>Полный список сортов</h3>
            <div class="catalog-tools">
              <input type="search" id="catalogSearch" placeholder="Найти сорт, например apple_fuji" />
            </div>
            <div id="catalogList" class="catalog-list"></div>
          </section>
        </main>

        <aside>
          <section class="panel">
            <h2>Последнее распознавание</h2>
            <div id="lastResult" class="result-state empty">
              <div class="idle-result">
                <img src="/api/serve_image?p=mem.jpg" alt="На весах ничего нет" loading="lazy" />
              </div>
            </div>
          </section>

          <section class="panel hidden" id="confirmPanel">
            <h3>Подтверждение</h3>
            <div id="confirmText" class="status"></div>
            <div class="actions confirm-actions">
              <button type="button" class="btn-primary" id="confirmYesBtn">Да, это он</button>
              <button type="button" class="btn-danger" id="confirmNoBtn">Не тот продукт</button>
              <button type="button" class="btn-ghost" id="adminAddBtn">Добавить новый продукт</button>
            </div>
            <form id="adminAddForm" class="admin-add hidden">
              <div class="field">
                <label for="adminTokenInput">Пароль администратора</label>
                <input type="password" id="adminTokenInput" autocomplete="current-password" required />
              </div>
              <div class="admin-add-grid">
                <div class="field">
                  <label for="adminProductTypeInput">Тип продукта</label>
                  <input type="text" id="adminProductTypeInput" list="adminProductTypeOptions" placeholder="apple" pattern="[a-z0-9]+" required />
                  <datalist id="adminProductTypeOptions"></datalist>
                </div>
                <div class="field">
                  <label for="adminProductSortInput">Сорт</label>
                  <input type="text" id="adminProductSortInput" list="adminProductSortOptions" placeholder="fuji" pattern="[a-z0-9_]+" required />
                  <datalist id="adminProductSortOptions"></datalist>
                </div>
              </div>
              <div class="field">
                <label for="adminPriceInput">Цена за кг, ₽</label>
                <input type="number" id="adminPriceInput" min="0.01" step="0.01" required />
              </div>
              <div class="actions">
                <button type="submit" class="btn-primary" id="adminSubmitBtn">Сохранить в train и БД</button>
                <button type="button" class="btn-secondary" id="adminCancelBtn">Отмена</button>
              </div>
            </form>
          </section>

          <section class="panel hidden" id="topMatchesPanel">
            <h3>Ближайшие варианты</h3>
            <div id="topMatches" class="match-list"></div>
            <div class="actions" style="margin-top: 12px;">
              <button type="button" class="btn-ghost" id="openCatalogBtn">Нет в списке</button>
            </div>
          </section>
        </aside>
      </div>
    </div>

    <script>
      const form = document.getElementById('predictForm');
      const filePicker = document.getElementById('filePicker');
      const fileInput = document.getElementById('imageInput');
      const previewImg = document.getElementById('previewImg');
      const fileTitle = document.getElementById('fileTitle');
      const statusEl = document.getElementById('status');
      const submitBtn = document.getElementById('submitBtn');
      const resetBtn = document.getElementById('resetBtn');

      const lastResultEl = document.getElementById('lastResult');
      const confirmPanel = document.getElementById('confirmPanel');
      const confirmText = document.getElementById('confirmText');
      const confirmYesBtn = document.getElementById('confirmYesBtn');
      const confirmNoBtn = document.getElementById('confirmNoBtn');
      const adminAddBtn = document.getElementById('adminAddBtn');
      const adminAddForm = document.getElementById('adminAddForm');
      const adminTokenInput = document.getElementById('adminTokenInput');
      const adminProductTypeInput = document.getElementById('adminProductTypeInput');
      const adminProductSortInput = document.getElementById('adminProductSortInput');
      const adminProductTypeOptions = document.getElementById('adminProductTypeOptions');
      const adminProductSortOptions = document.getElementById('adminProductSortOptions');
      const adminPriceInput = document.getElementById('adminPriceInput');
      const adminSubmitBtn = document.getElementById('adminSubmitBtn');
      const adminCancelBtn = document.getElementById('adminCancelBtn');
      const topMatchesPanel = document.getElementById('topMatchesPanel');
      const topMatchesEl = document.getElementById('topMatches');
      const openCatalogBtn = document.getElementById('openCatalogBtn');
      const catalogPanel = document.getElementById('catalogPanel');
      const catalogSearch = document.getElementById('catalogSearch');
      const catalogList = document.getElementById('catalogList');

      let lastPrediction = null;
      let lastImageFile = null;
      let currentPredictionId = null;
      let isSubmitting = false;
      let catalogItems = null;
      const idleImageSrc = '/api/serve_image?p=mem.jpg';

      filePicker.addEventListener('click', () => fileInput.click());
      filePicker.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          fileInput.click();
        }
      });
      filePicker.addEventListener('dragover', (event) => {
        event.preventDefault();
        filePicker.classList.add('dragover');
      });
      filePicker.addEventListener('dragleave', () => filePicker.classList.remove('dragover'));
      filePicker.addEventListener('drop', (event) => {
        event.preventDefault();
        filePicker.classList.remove('dragover');
        const file = event.dataTransfer.files && event.dataTransfer.files[0];
        if (!file) return;
        const transfer = new DataTransfer();
        transfer.items.add(file);
        fileInput.files = transfer.files;
        handleFile(file);
      });
      fileInput.addEventListener('change', () => {
        const file = fileInput.files && fileInput.files[0];
        if (file) handleFile(file);
      });

      function handleFile(file) {
        if (file.size > 10 * 1024 * 1024) {
          setStatus('Файл больше 10 MB.', 'error');
          return;
        }
        lastImageFile = file;
        fileTitle.textContent = file.name;
        const reader = new FileReader();
        reader.onload = (event) => {
          previewImg.src = event.target.result;
          previewImg.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const file = fileInput.files && fileInput.files[0];
        if (!file) {
          setStatus('Выберите изображение.', 'error');
          return;
        }

        hideDecisionPanels();
        catalogPanel.classList.add('hidden');
        setStatus('Выполняется распознавание...', 'info');
        isSubmitting = true;
        submitBtn.disabled = true;

        const formData = new FormData();
        formData.append('image', file);
        formData.append('weight_grams', document.getElementById('weightInput').value);
        formData.append('top_k', document.getElementById('topkInput').value || '5');

        try {
          const response = await fetch('/api/predict', { method: 'POST', body: formData });
          const payload = await readJsonResponse(response);
          if (!response.ok) {
            throw new Error(payload.detail || `Ошибка сервера ${response.status}`);
          }
          lastPrediction = payload;
          lastImageFile = file;
          currentPredictionId = payload.prediction_id || null;
          renderLastResult(payload);
          renderNextStep(payload);
          setStatus(isEmptyPrediction(payload) ? 'На весах ничего нет.' : 'Распознавание завершено.', isEmptyPrediction(payload) ? 'info' : 'ok');
        } catch (error) {
          lastPrediction = null;
          renderErrorResult(String(error.message || error));
          setStatus(String(error.message || error), 'error');
        } finally {
          isSubmitting = false;
          submitBtn.disabled = false;
        }
      });

      resetBtn.addEventListener('click', () => {
        form.reset();
        fileInput.value = '';
        previewImg.removeAttribute('src');
        previewImg.style.display = 'none';
        fileTitle.textContent = 'Выберите изображение или перетащите сюда';
        lastPrediction = null;
        lastImageFile = null;
        renderIdleResult();
        hideDecisionPanels();
        catalogPanel.classList.add('hidden');
        setStatus('', 'info');
      });

      confirmYesBtn.addEventListener('click', async () => {
        if (!lastPrediction || !lastPrediction.product) return;
        try {
          await fetch('/api/selection', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ selected: lastPrediction.product.product_id }),
          });
          hideDecisionPanels();
          setStatus('Выбор подтвержден.', 'ok');
        } catch (error) {
          setStatus(`Не удалось подтвердить выбор: ${error}`, 'error');
        }
      });

      confirmNoBtn.addEventListener('click', () => {
        renderTopMatches();
        setStatus('Выберите корректный вариант из ближайших или откройте полный каталог.', 'info');
      });

      adminAddBtn.addEventListener('click', () => showAdminAddForm());
      adminCancelBtn.addEventListener('click', () => {
        adminAddForm.classList.add('hidden');
        adminAddForm.reset();
      });
      adminProductTypeInput.addEventListener('input', () => populateAdminOptions());
      adminAddForm.addEventListener('submit', (event) => submitAdminCatalogExample(event));

      openCatalogBtn.addEventListener('click', () => showCatalog());
      catalogSearch.addEventListener('input', () => renderCatalog(catalogSearch.value));
      pollLatestPrediction();
      setInterval(pollLatestPrediction, 1500);

      async function pollLatestPrediction() {
        if (isSubmitting) return;
        try {
          const response = await fetch('/api/predictions/latest', { cache: 'no-store' });
          const payload = await readJsonResponse(response);
          if (!response.ok || payload.status !== 'ok' || !payload.prediction) return;
          const prediction = payload.prediction;
          const predictionId = payload.prediction_id || prediction.prediction_id;
          if (!predictionId || predictionId === currentPredictionId) return;

          lastPrediction = prediction;
          lastImageFile = null;
          currentPredictionId = predictionId;
          catalogPanel.classList.add('hidden');
          renderLastResult(prediction);
          renderNextStep(prediction);
          setStatus('Получено новое состояние из API.', 'info');
        } catch (_error) {
          return;
        }
      }

      function renderNextStep(payload) {
        hideDecisionPanels();
        if (isEmptyPrediction(payload)) {
          return;
        }
        if (payload.status === 'ok' && payload.product) {
          confirmText.textContent = `Распознан ${formatMatchName(payload.product)}. Подтвердите, что это правильный продукт.`;
          confirmPanel.classList.remove('hidden');
          return;
        }
        if (payload.status === 'error' && (lastImageFile || payload.prediction_id) && !payload.warning_code) {
          openCatalogBtn.textContent = 'Выбрать сорт вручную';
          topMatchesEl.innerHTML = '<div class="empty">Ближайших вариантов нет.</div>';
          topMatchesPanel.classList.remove('hidden');
        }
      }

      function renderLastResult(payload) {
        if (isEmptyPrediction(payload)) {
          renderIdleResult(payload);
          return;
        }

        const state = payload.status || 'error';
        lastResultEl.className = `result-state ${state}`;
        if (state === 'ok' && payload.product) {
          const product = payload.product;
          lastResultEl.innerHTML = `
            <div class="result-title">${escapeHtml(formatMatchName(product))}</div>
            <div>${escapeHtml(payload.message || 'Продукт распознан.')}</div>
            <div class="result-meta">
              <div class="metric"><div class="metric-label">Вес</div><div class="metric-value">${formatWeightKg(payload.weight_grams)}</div></div>
              <div class="metric"><div class="metric-label">Цена за кг</div><div class="metric-value">${formatPrice(product.price_rub_per_kg)}</div></div>
              <div class="metric"><div class="metric-label">Итого</div><div class="metric-value">${formatTotal(payload.total_price)}</div></div>
            </div>
            ${renderHistoryImagePreview(payload)}
          `;
          return;
        }

        const title = state === 'warning' ? 'Распознавание остановлено' : 'Ошибка распознавания';
        lastResultEl.innerHTML = `
          <div class="result-title">${title}</div>
          <div>${escapeHtml(payload.message || 'Нет результата.')}</div>
          ${renderHistoryImagePreview(payload)}
          ${payload.warning_code ? `<div class="result-meta"><div class="metric"><div class="metric-label">Код</div><div class="metric-value">${escapeHtml(payload.warning_code)}</div></div></div>` : ''}
        `;
      }

      function renderIdleResult(_payload = null) {
        lastResultEl.className = 'result-state empty';
        lastResultEl.innerHTML = `
          <div class="idle-result">
            <img src="${idleImageSrc}" alt="На весах ничего нет" loading="lazy" />
          </div>
        `;
      }

      function renderHistoryImagePreview(payload) {
        const predictionId = payload.prediction_id || currentPredictionId;
        if (!predictionId) return '';

        const src = `/api/predictions/${encodeURIComponent(predictionId)}/image`;
        return `
          <div class="history-image-preview">
            <div class="history-image-label">Исходное изображение</div>
            <div class="history-image-frame">
              <img src="${src}" alt="Исходное изображение" loading="lazy" onerror="this.closest('.history-image-preview').classList.add('hidden')" />
            </div>
          </div>
        `;
      }

      function renderErrorResult(message) {
        lastResultEl.className = 'result-state error';
        lastResultEl.innerHTML = `<div class="result-title">Ошибка запроса</div><div>${escapeHtml(message)}</div>`;
      }

      function isEmptyPrediction(payload) {
        return !!payload && (payload.status === 'empty' || payload.weight_grams === 0);
      }

      function renderTopMatches() {
        hideDecisionPanels();
        const matches = uniqueMatchesBySort([
          ...(lastPrediction && lastPrediction.product ? [lastPrediction.product] : []),
          ...(lastPrediction && lastPrediction.top_matches ? lastPrediction.top_matches : []),
        ]);

        topMatchesEl.innerHTML = '';
        if (matches.length === 0) {
          topMatchesEl.innerHTML = '<div class="empty">Других ближайших вариантов нет.</div>';
        } else {
          for (const match of matches) {
            topMatchesEl.appendChild(createMatchButton(match));
          }
        }
        openCatalogBtn.textContent = 'Нет в списке';
        topMatchesPanel.classList.remove('hidden');
      }

      function uniqueMatchesBySort(matches) {
        const uniqueMatches = [];
        const seen = new Set();
        for (const match of matches) {
          const key = uniqueMatchKey(match);
          if (seen.has(key)) continue;
          seen.add(key);
          uniqueMatches.push(match);
        }
        return uniqueMatches;
      }

      function uniqueMatchKey(match) {
        if (!match) return '';
        if (match.product_type || match.product_sort) return `${match.product_type || ''}::${match.product_sort || ''}`;
        return match.name || match.product_id || '';
      }

      function createMatchButton(match) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'match-card';
        button.addEventListener('click', () => submitIncorrectFeedback(match.name || labelFromMatch(match), 'top_k'));

        const image = document.createElement('img');
        const imagePath = imagePathFromMatch(match);
        if (imagePath) {
          image.src = `/api/serve_image?p=${encodeURIComponent(imagePath.replace(/\\/g, '/'))}`;
          image.onerror = () => image.removeAttribute('src');
        }
        image.alt = '';

        const body = document.createElement('div');
        const totalPrice = (match.price_rub_per_kg * (lastPrediction?.weight_grams || 0)) / 1000;
        body.innerHTML = `
          <div class="match-name">${escapeHtml(formatMatchName(match))}</div>
          <div class="match-details">Итог ${formatTotal(totalPrice)} · ${formatPrice(match.price_rub_per_kg)}</div>
        `;

        button.appendChild(image);
        button.appendChild(body);
        return button;
      }

      async function showCatalog() {
        hideDecisionPanels();
        catalogPanel.classList.remove('hidden');
        catalogSearch.focus();
        try {
          await loadCatalogItems();
        } catch (error) {
          catalogList.innerHTML = `<div class="empty">${escapeHtml(String(error.message || error))}</div>`;
          return;
        }
        renderCatalog(catalogSearch.value);
      }

      async function loadCatalogItems() {
        if (catalogItems) return catalogItems;
        catalogList.innerHTML = '<div class="empty">Загрузка каталога...</div>';
        const response = await fetch('/api/catalog/varieties');
        const payload = await readJsonResponse(response);
        if (!response.ok) throw new Error(payload.detail || 'Не удалось загрузить каталог.');
        catalogItems = payload.items || [];
        return catalogItems;
      }

      function renderCatalog(query) {
        const normalizedQuery = String(query || '').trim().toLowerCase();
        const items = (catalogItems || []).filter((item) => {
          const haystack = `${item.label} ${item.product_type} ${item.product_sort}`.toLowerCase();
          return !normalizedQuery || haystack.includes(normalizedQuery);
        }).slice(0, 120);

        catalogList.innerHTML = '';
        if (items.length === 0) {
          catalogList.innerHTML = '<div class="empty">Сорт не найден.</div>';
          return;
        }

        for (const item of items) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'catalog-item';
          button.addEventListener('click', () => submitIncorrectFeedback(item.label, 'catalog'));
          const totalPrice = (item.price_rub_per_kg * (lastPrediction?.weight_grams || 0)) / 1000;
          button.innerHTML = `
            <span>
              <span class="catalog-label">${escapeHtml(item.label)}</span><br />
              <span class="match-details">${formatPrice(item.price_rub_per_kg)}</span>
            </span>
            <span class="catalog-price">${formatTotal(totalPrice)}</span>
          `;
          catalogList.appendChild(button);
        }
      }

      async function showAdminAddForm() {
        if (!lastPrediction || (!lastImageFile && !lastPrediction.prediction_id)) {
          setStatus('Нет изображения или сохраненного результата распознавания.', 'error');
          return;
        }
        adminAddForm.classList.remove('hidden');
        adminSubmitBtn.disabled = false;
        if (lastPrediction.product) {
          adminPriceInput.value = typeof lastPrediction.product.price_rub_per_kg === 'number'
            ? lastPrediction.product.price_rub_per_kg
            : '';
        }
        try {
          await loadCatalogItems();
          populateAdminOptions();
        } catch (error) {
          setStatus(String(error.message || error), 'error');
        }
        adminTokenInput.focus();
      }

      function populateAdminOptions() {
        const items = catalogItems || [];
        const selectedType = adminProductTypeInput.value.trim().toLowerCase();
        const types = uniqueSorted(items.map((item) => item.product_type).filter(Boolean));
        const sorts = uniqueSorted(items
          .filter((item) => !selectedType || item.product_type === selectedType)
          .map((item) => item.product_sort)
          .filter(Boolean));

        adminProductTypeOptions.innerHTML = types.map((value) => `<option value="${escapeHtml(value)}"></option>`).join('');
        adminProductSortOptions.innerHTML = sorts.map((value) => `<option value="${escapeHtml(value)}"></option>`).join('');
      }

      function uniqueSorted(values) {
        return [...new Set(values.map((value) => String(value).trim()).filter(Boolean))].sort();
      }

      async function submitAdminCatalogExample(event) {
        event.preventDefault();
        if (!lastPrediction || (!lastImageFile && !lastPrediction.prediction_id)) {
          setStatus('Нет изображения или сохраненного результата распознавания.', 'error');
          return;
        }

        const productType = adminProductTypeInput.value.trim().toLowerCase();
        const productSort = adminProductSortInput.value.trim().toLowerCase();
        if (!/^[a-z0-9]+$/.test(productType) || !/^[a-z0-9_]+$/.test(productSort)) {
          setStatus('Тип и сорт должны быть ASCII slug: apple и fuji.', 'error');
          return;
        }

        const formData = new FormData();
        formData.append('admin_token', adminTokenInput.value);
        formData.append('product_type', productType);
        formData.append('product_sort', productSort);
        formData.append('price_rub_per_kg', adminPriceInput.value);
        if (lastImageFile) {
          formData.append('image', lastImageFile);
        }
        if (lastPrediction.prediction_id) {
          formData.append('prediction_id', lastPrediction.prediction_id);
        }

        adminSubmitBtn.disabled = true;
        setStatus('Добавляем пример в train dataset и БД...', 'info');
        try {
          const response = await fetch('/api/admin/catalog/examples', { method: 'POST', body: formData });
          const payload = await readJsonResponse(response);
          if (!response.ok) {
            const detail = payload.detail || 'Не удалось добавить продукт.';
            if (response.status === 403 && (detail === 'Invalid admin token' || detail === 'Неверный пароль администратора')) {
              adminTokenInput.focus();
              throw new Error('Неверный пароль администратора');
            }
            throw new Error(detail);
          }
          catalogItems = null;
          adminAddForm.reset();
          hideDecisionPanels();
          catalogPanel.classList.add('hidden');
          setStatus(`Добавлено в train и БД: ${payload.label}`, 'ok');
        } catch (error) {
          setStatus(String(error.message || error), 'error');
        } finally {
          adminSubmitBtn.disabled = false;
        }
      }

      async function submitIncorrectFeedback(label, selectedFrom) {
        if (!lastPrediction || (!lastImageFile && !lastPrediction.prediction_id)) {
          setStatus('Нет изображения или сохраненного результата распознавания.', 'error');
          return;
        }
        const formData = new FormData();
        if (lastImageFile) {
          formData.append('image', lastImageFile);
        }
        if (lastPrediction.prediction_id) {
          formData.append('prediction_id', lastPrediction.prediction_id);
        }
        formData.append('correct_label', label);
        formData.append('selected_from', selectedFrom);
        formData.append('prediction_json', JSON.stringify({
          prediction_id: lastPrediction.prediction_id,
          created_at: lastPrediction.created_at,
          status: lastPrediction.status,
          message: lastPrediction.message,
          warning_code: lastPrediction.warning_code,
          weight_grams: lastPrediction.weight_grams,
          product: lastPrediction.product,
          top_matches: lastPrediction.top_matches || [],
        }));

        setStatus('Сохраняем пример для дообучения...', 'info');
        try {
          const response = await fetch('/api/feedback/incorrect', { method: 'POST', body: formData });
          const payload = await readJsonResponse(response);
          if (!response.ok) throw new Error(payload.detail || 'Не удалось сохранить feedback.');
          hideDecisionPanels();
          catalogPanel.classList.add('hidden');
          setStatus(`Выбор сохранен.`, 'ok');
        } catch (error) {
          setStatus(String(error.message || error), 'error');
        }
      }

      function hideDecisionPanels() {
        confirmPanel.classList.add('hidden');
        topMatchesPanel.classList.add('hidden');
        adminAddForm.classList.add('hidden');
      }

      async function readJsonResponse(response) {
        const text = await response.text();
        if (!text) return {};
        try {
          return JSON.parse(text);
        } catch (_error) {
          return { detail: text };
        }
      }

      function setStatus(message, kind) {
        statusEl.textContent = message;
        statusEl.style.color = kind === 'error' ? 'var(--danger)' : kind === 'ok' ? 'var(--success)' : 'var(--muted)';
      }

      function formatMatchName(match) {
        return match.name || labelFromMatch(match);
      }

      function labelFromMatch(match) {
        if (!match) return '';
        if (match.product_type && match.product_sort) return `${match.product_type}_${match.product_sort}`;
        return match.product_id || '';
      }

      function imagePathFromMatch(match) {
        if (!match || !match.metadata) return null;
        return match.metadata.path || match.metadata.source_path || match.metadata.filename || null;
      }

      function formatScore(value) {
        return typeof value === 'number' ? value.toFixed(3) : 'нет';
      }

      function formatNumber(value) {
        return typeof value === 'number' ? value.toLocaleString('ru-RU', { maximumFractionDigits: 2 }) : 'нет';
      }

      function formatWeightKg(value) {
        return typeof value === 'number'
          ? `${(value / 1000).toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} кг`
          : 'нет';
      }

      function formatPrice(value) {
        return typeof value === 'number' ? `${value.toLocaleString('ru-RU', { maximumFractionDigits: 2 })} ₽/кг` : 'цены нет';
      }

      function formatTotal(value) {
        return typeof value === 'number' ? `${value.toLocaleString('ru-RU', { maximumFractionDigits: 2 })} ₽` : 'нет';
      }

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;',
        }[char]));
      }
    </script>
  </body>
</html>
